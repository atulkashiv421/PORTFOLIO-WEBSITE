<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Work Experience</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:#190149;
color:white;
text-align:center;
padding:60px;
}

h1{
margin-bottom:60px;
font-size:2.6rem;
}

/* cards container */

.box{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:45px;
}

/* card */

.card{

padding:30px;
border-radius:18px;
width:260px;
text-decoration:none;
color:white;
display:flex;
flex-direction:column;
align-items:center;

opacity:0;
transform:translateY(70px);
transition:0.7s;

}

.card:hover{
transform:scale(1.08);
box-shadow:0 0 25px white;
}

.card h3{
margin-bottom:15px;
}

/* progress bar */

.progress{
width:100%;
background:#333;
border-radius:20px;
overflow:hidden;
margin-top:10px;
}

.progress-bar{
height:14px;
width:0;
background:linear-gradient(90deg,#8e12e1,#ff00cc);
border-radius:20px;
transition:1.5s;
}

.percent{
margin-top:6px;
font-size:14px;
}

/* colors */

.card:nth-child(1){background:linear-gradient(135deg,#ff512f,#dd2476);}
.card:nth-child(2){background:linear-gradient(135deg,#36d1dc,#5b86e5);}
.card:nth-child(3){background:linear-gradient(135deg,#f7971e,#ffd200);}
.card:nth-child(4){background:linear-gradient(135deg,#8e2de2,#4a00e0);}
.card:nth-child(5){background:linear-gradient(135deg,#11998e,#38ef7d);}
.card:nth-child(6){background:linear-gradient(135deg,#fc466b,#3f5efb);}
.card:nth-child(7){background:linear-gradient(135deg,#f953c6,#b91d73);}

/* animation */

.show{
opacity:1;
transform:translateY(0);
}

/* button */

button{
margin-top:80px;
padding:14px 35px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#8e12e1,#ff00cc);
color:white;
cursor:pointer;
font-size:16px;
transition:0.4s;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 20px #ff00cc;
}

</style>

</head>

<body>

<h1>My Work Experience</h1>

<div class="box">

<a href="YOUR_LINK" class="card" target="_blank">

<h3>My SQL</h3>

<div class="progress">
<div class="progress-bar" data-width="90%"></div>
</div>

<div class="percent">90%</div>

</a>


<a href="YOUR_LINK" class="card" target="_blank">

<h3>Python Projects</h3>

<div class="progress">
<div class="progress-bar" data-width="80%"></div>
</div>

<div class="percent">80%</div>

</a>


<a href="YOUR_LINK" class="card" target="_blank">

<h3>YouTube Editing</h3>

<div class="progress">
<div class="progress-bar" data-width="75%"></div>
</div>

<div class="percent">75%</div>

</a>


<a href="YOUR_LINK" class="card" target="_blank">

<h3>Laptop Controller</h3>

<div class="progress">
<div class="progress-bar" data-width="70%"></div>
</div>

<div class="percent">70%</div>

</a>


<a href="https://github.com/atulkashiv421/BIRTHDAYWISHES.git" class="card" target="_blank">

<h3>Web Development</h3>

<div class="progress">
<div class="progress-bar" data-width="85%"></div>
</div>

<div class="percent">85%</div>

</a>


<a href="https://github.com/atulkashiv421/JARVIS-WORK.git" class="card" target="_blank">

<h3>AI / ML Projects</h3>

<div class="progress">
<div class="progress-bar" data-width="60%"></div>
</div>

<div class="percent">60%</div>

</a>


<a href="https://github.com/atulkashiv421/DICE-ROLLER.git" class="card" target="_blank">

<div class="progress">
<div class="progress-bar" data-width="50%"></div>
</div>

<div class="percent">50%</div>

</a>

</div>


<button onclick="goBack()">Back To Home</button>

<script>

/* card animation */

const cards=document.querySelectorAll(".card");

cards.forEach((card,i)=>{
setTimeout(()=>{
card.classList.add("show");
},i*300);
});

/* progress animation */

const bars=document.querySelectorAll(".progress-bar");

bars.forEach(bar=>{
setTimeout(()=>{
bar.style.width=bar.dataset.width;
},600);
});

function goBack(){
window.location.href="index.html";
}

</script>

</body>
</html>
